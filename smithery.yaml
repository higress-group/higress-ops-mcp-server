# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - username
      - password
    properties:
      higressUrl:
        type: string
        default: http://localhost:8001
        description: URL for the Higress API
      username:
        type: string
        description: Username for Higress API authentication
      password:
        type: string
        description: Password for Higress API authentication
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'python', args: ['server.py', '--higress-url', config.higressUrl, '--username', config.username, '--password', config.password], env: {} })
  exampleConfig:
    higressUrl: http://localhost:8001
    username: admin
    password: password
